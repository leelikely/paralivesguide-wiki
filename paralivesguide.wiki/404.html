    <script>
        // =============================================
        // COOKIE CONSENT BANNER (GDPR/CCPA compliant)
        // =============================================
        (function() {
            if (localStorage.getItem('pg_cookie_consent')) return;

            var banner = document.createElement('div');
            banner.id = 'cookie-banner';
            banner.innerHTML = '<div style="position:fixed;bottom:0;left:0;right:0;z-index:9999;background:#fffdf7;border-top:2px solid #e8c56d;padding:14px 20px;font-family:Nunito,system-ui,sans-serif;font-size:13px;color:#5c4033;display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:12px;box-shadow:0 -4px 20px rgba(0,0,0,0.08)">'
                + '<span>🍪 This site uses cookies for ads and analytics. By continuing, you agree. <a href="/privacy-policy.html" style="color:#d4845f;font-weight:700;text-decoration:underline">Learn more</a></span>'
                + '<button id="cookie-accept" style="background:#d4845f;color:#fff;border:none;padding:8px 20px;border-radius:20px;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap">Accept</button>'
                + '<button id="cookie-decline" style="background:transparent;color:#8b7e74;border:1px solid #ddd6cc;padding:8px 20px;border-radius:20px;font-weight:600;font-size:13px;cursor:pointer;white-space:nowrap">Decline</button>'
                + '</div>';
            document.body.appendChild(banner);

            document.getElementById('cookie-accept').addEventListener('click', function() {
                localStorage.setItem('pg_cookie_consent', 'accepted');
                document.getElementById('cookie-banner').remove();
            });
            document.getElementById('cookie-decline').addEventListener('click', function() {
                localStorage.setItem('pg_cookie_consent', 'declined');
                document.getElementById('cookie-banner').remove();
            });
        })();
    </script>
